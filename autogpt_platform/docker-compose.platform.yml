# Environment Variable Loading Order (first → last, later overrides earlier):
# 1. backend/.env.default - Default values for all settings
# 2. backend/.env - User's custom configuration (if exists)
# 3. environment key - Docker-specific overrides defined below
# 4. Shell environment - Variables exported before running docker compose
# 5. CLI arguments - docker compose run -e VAR=value

# Common backend environment - Docker service names
x-backend-env:
  &backend-env # Docker internal service hostnames (override localhost defaults)
  PYRO_HOST: "0.0.0.0"
  AGENTSERVER_HOST: rest_server
  SCHEDULER_HOST: scheduler_server
  DATABASEMANAGER_HOST: database_manager
  EXECUTIONMANAGER_HOST: executor
  NOTIFICATIONMANAGER_HOST: notification_server
  CLAMAV_SERVICE_HOST: clamav
  DB_HOST: db
  REDIS_HOST: redis
  RABBITMQ_HOST: rabbitmq
  GRAPHITI_FALKORDB_HOST: falkordb
  GRAPHITI_FALKORDB_PORT: "6379"
  # Override Supabase URL for Docker network
  SUPABASE_URL: http://kong:8000
  # Database connection string for Docker network
  # This cannot be constructed like in .env because we cannot interpolate values set here (DB_HOST)
  DATABASE_URL: postgresql://postgres:your-super-secret-and-long-postgres-password@db:5432/postgres?connect_timeout=60&schema=platform
  DIRECT_URL: postgresql://postgres:your-super-secret-and-long-postgres-password@db:5432/postgres?connect_timeout=60&schema=platform

# Common env_file configuration for backend services
x-backend-env-files: &backend-env-files
  env_file:
    - backend/.env.default # Base defaults (always exists)
    - path: backend/.env # User overrides (optional)
      required: false

services:
  migrate:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: migrate
    command:
      [
        "sh",
        "-c",
        "prisma generate && python3 scripts/gen_prisma_types_stub.py && prisma migrate deploy",
      ]
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/migrations
          action: rebuild
    depends_on:
      db:
        condition: service_healthy
    <<: *backend-env-files
    environment:
      <<: *backend-env
    networks:
      - app-network
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "prisma migrate status | grep -q 'No pending migrations' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 2-master Redis Cluster for local dev: keeps the footprint minimal while
  # still exercising cross-slot routing (slots 0-8191 on redis, 8192-16383 on
  # redis-2). Catches sharding bugs — e.g. cross-slot MULTI/EXEC — on a laptop
  # rather than in prod. No replicas: local crash = re-bootstrap, acceptable.
  redis:
    image: redis:latest
    command:
      - redis-server
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - /data/nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --cluster-require-full-coverage
      - "no"
      - --cluster-announce-hostname
      - redis
      - --cluster-preferred-endpoint-type
      - hostname
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli ping && redis-cli cluster info | grep -q 'cluster_state:ok'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-2:
    image: redis:latest
    command:
      - redis-server
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - /data/nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --cluster-require-full-coverage
      - "no"
      - --cluster-announce-hostname
      - redis-2
      - --cluster-preferred-endpoint-type
      - hostname
      - --appendonly
      - "yes"
    volumes:
      - redis-2-data:/data
    networks:
      - app-network
    healthcheck:
      test:
        ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot sidecar that bootstraps the 2-master cluster on first boot.
  # `redis-cli --cluster create` enforces a 3-node minimum; we go lower
  # locally by issuing CLUSTER MEET + CLUSTER ADDSLOTSRANGE directly.
  # Topology persists to each pod's nodes.conf, so subsequent restarts are
  # no-ops (cluster_state:ok short-circuits the block).
  redis-init:
    image: redis:latest
    depends_on:
      redis:
        condition: service_started
      redis-2:
        condition: service_started
    command:
      - sh
      - -c
      - |
        until redis-cli -h redis ping; do sleep 1; done
        until redis-cli -h redis-2 ping; do sleep 1; done
        size=$$(redis-cli -h redis cluster info | awk -F: '/^cluster_size/ {print $$2+0}' | tr -d '[:cntrl:]')
        state=$$(redis-cli -h redis cluster info | awk -F: '/^cluster_state/ {print $$2}' | tr -d '[:cntrl:]')
        if [ "$$state" = "ok" ] && [ "$$size" = "2" ]; then
          echo "cluster already bootstrapped"
          exit 0
        fi
        # Resolve peer IP via getent — CLUSTER MEET needs an IP/hostname that
        # the seed node can dial, and short DNS names sometimes fail race on
        # first boot.
        peer_ip=""
        for i in $$(seq 1 30); do
          peer_ip=$$(getent hosts redis-2 | awk '{print $$1}' | head -1)
          if [ -n "$$peer_ip" ]; then break; fi
          sleep 1
        done
        if [ -z "$$peer_ip" ]; then
          echo "could not resolve redis-2" >&2
          exit 1
        fi
        redis-cli -h redis cluster addslotsrange 0 8191 || true
        redis-cli -h redis-2 cluster addslotsrange 8192 16383 || true
        redis-cli -h redis cluster meet "$$peer_ip" 6379
        for i in $$(seq 1 30); do
          size=$$(redis-cli -h redis cluster info | awk -F: '/^cluster_size/ {print $$2+0}' | tr -d '[:cntrl:]')
          state=$$(redis-cli -h redis cluster info | awk -F: '/^cluster_state/ {print $$2}' | tr -d '[:cntrl:]')
          if [ "$$state" = "ok" ] && [ "$$size" = "2" ]; then
            echo "cluster bootstrapped (2 masters, 16384 slots)"
            exit 0
          fi
          sleep 1
        done
        echo "cluster failed to converge" >&2
        redis-cli -h redis cluster info >&2
        redis-cli -h redis cluster nodes >&2
        exit 1
    networks:
      - app-network
    restart: "no"
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379" # FalkorDB Redis protocol (6380 to avoid clash with Redis on 6379)
      - "3001:3000" # FalkorDB web UI
    environment:
      - REDIS_ARGS=--requirepass ${GRAPHITI_FALKORDB_PASSWORD:-}
    volumes:
      - falkordb_data:/data
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -p 6379 -a "${GRAPHITI_FALKORDB_PASSWORD:-}" --no-auth-warning ping && wget --spider -q http://localhost:3000 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.1.4
    container_name: rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    <<: *backend-env-files
    environment:
      <<: *backend-env
    ports:
      - "5672:5672"

  rest_server:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: server
    command: ["rest"] # points to entry in [tool.poetry.scripts] in pyproject.toml
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/
          action: rebuild
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    <<: *backend-env-files
    environment:
      <<: *backend-env
    ports:
      - "8006:8006"
    volumes:
      - workspace-data:/app/autogpt_platform/backend/workspaces
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  executor:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: server
    command: ["executor"] # points to entry in [tool.poetry.scripts] in pyproject.toml
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/
          action: rebuild
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      database_manager:
        condition: service_started
    <<: *backend-env-files
    environment:
      <<: *backend-env
    ports:
      - "8002:8002"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  copilot_executor:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: server
    command: ["python", "-u", "-m", "backend.copilot.executor"]
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/
          action: rebuild
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      database_manager:
        condition: service_started
    <<: *backend-env-files
    environment:
      <<: *backend-env
      PYTHONUNBUFFERED: "1"
    ports:
      - "8008:8008"
    volumes:
      - workspace-data:/app/autogpt_platform/backend/workspaces
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  websocket_server:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: server
    command: ["ws"] # points to entry in [tool.poetry.scripts] in pyproject.toml
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/
          action: rebuild
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      database_manager:
        condition: service_started
    <<: *backend-env-files
    environment:
      <<: *backend-env
    ports:
      - "8001:8001"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  database_manager:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: server
    command: ["db"] # points to entry in [tool.poetry.scripts] in pyproject.toml
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/
          action: rebuild
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    <<: *backend-env-files
    environment:
      <<: *backend-env
    ports:
      - "8005:8005"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scheduler_server:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: server
    command: ["scheduler"] # points to entry in [tool.poetry.scripts] in pyproject.toml
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/
          action: rebuild
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      database_manager:
        condition: service_started
    <<: *backend-env-files
    environment:
      <<: *backend-env
    ports:
      - "8003:8003"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  notification_server:
    build:
      context: ../
      dockerfile: autogpt_platform/backend/Dockerfile
      target: server
    command: ["notification"] # points to entry in [tool.poetry.scripts] in pyproject.toml
    develop:
      watch:
        - path: ./
          target: autogpt_platform/backend/
          action: rebuild
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      database_manager:
        condition: service_started
    <<: *backend-env-files
    environment:
      <<: *backend-env
    ports:
      - "8007:8007"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    build:
      context: ../
      dockerfile: autogpt_platform/frontend/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_PW_TEST: ${NEXT_PUBLIC_PW_TEST:-false}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Load environment variables in order (later overrides earlier)
    env_file:
      - path: ./frontend/.env.default # Base defaults (always exists)
      - path: ./frontend/.env # User overrides (optional)
        required: false
    environment:
      # Server-side environment variables (Docker service names)
      # These override the localhost URLs from env files when running in Docker
      AUTH_CALLBACK_URL: http://rest_server:8006/auth/callback
      SUPABASE_URL: http://kong:8000
      AGPT_SERVER_URL: http://rest_server:8006/api
      AGPT_WS_SERVER_URL: ws://websocket_server:8001/ws
volumes:
  workspace-data:
  falkordb_data:
  redis-data:

networks:
  app-network:
    driver: bridge
