# Override that replaces the default 1-shard ``redis`` cluster service from
# docker-compose.platform.yml with a 6-node Redis Cluster (3 masters +
# 3 replicas) so developers can exercise real sharding + MOVED redirects
# locally. The app always uses ``RedisCluster``; platform.yml's default
# already gives you a 1-shard cluster — apply this override only when you
# need to test multi-shard behaviour.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.redis-cluster.yml up
#
# Topology: six ``bitnamilegacy/redis-cluster`` containers. The ``redis``
# service keeps its compose hostname and port (6379) so every other service's
# ``REDIS_HOST=redis REDIS_PORT=6379`` continues to work — the client uses
# that as a startup node and auto-discovers the rest through CLUSTER SLOTS.
# The last node (``redis-node-6``) boots with REDIS_CLUSTER_CREATOR=yes, so
# once all six are up it calls ``cluster create`` to wire them together.
#
# DYNAMIC_IPS=yes (bitnami default) tells the cluster to re-resolve each
# node's IP on startup — that's what we want because docker assigns random
# IPs per container. Clients (including the Python RedisCluster client)
# end up talking to each node via its compose hostname.
#
# Note: docker compose merges this file on top of docker-compose.yml, which
# in turn extends docker-compose.platform.yml. We cannot "un-extend" the
# redis service from here, so we override every field (image, command, env,
# ports, healthcheck, volumes) that platform.yml sets for the 1-shard node;
# the extended bits we do not override (networks, restart policy) are
# harmless. We also override ``redis-init`` to a no-op: bitnami's cluster
# creator sidecar (``redis-node-6``) handles cluster bootstrap here.

x-redis-node-env: &redis-node-env
  ALLOW_EMPTY_PASSWORD: "yes"
  REDIS_NODES: "redis redis-node-2 redis-node-3 redis-node-4 redis-node-5 redis-node-6"

services:
  redis:
    image: bitnamilegacy/redis-cluster:7.4
    environment:
      <<: *redis-node-env
      REDIS_CLUSTER_ANNOUNCE_HOSTNAME: "redis"
      REDIS_CLUSTER_PREFERRED_ENDPOINT_TYPE: "hostname"
    command: ["/opt/bitnami/scripts/redis-cluster/run.sh"]
    ports:
      - "6379:6379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -p 6379 cluster info | grep -q 'cluster_state:ok'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  redis-node-2:
    image: bitnamilegacy/redis-cluster:7.4
    environment:
      <<: *redis-node-env
      REDIS_CLUSTER_ANNOUNCE_HOSTNAME: "redis-node-2"
      REDIS_CLUSTER_PREFERRED_ENDPOINT_TYPE: "hostname"
    networks:
      - app-network

  redis-node-3:
    image: bitnamilegacy/redis-cluster:7.4
    environment:
      <<: *redis-node-env
      REDIS_CLUSTER_ANNOUNCE_HOSTNAME: "redis-node-3"
      REDIS_CLUSTER_PREFERRED_ENDPOINT_TYPE: "hostname"
    networks:
      - app-network

  redis-node-4:
    image: bitnamilegacy/redis-cluster:7.4
    environment:
      <<: *redis-node-env
      REDIS_CLUSTER_ANNOUNCE_HOSTNAME: "redis-node-4"
      REDIS_CLUSTER_PREFERRED_ENDPOINT_TYPE: "hostname"
    networks:
      - app-network

  redis-node-5:
    image: bitnamilegacy/redis-cluster:7.4
    environment:
      <<: *redis-node-env
      REDIS_CLUSTER_ANNOUNCE_HOSTNAME: "redis-node-5"
      REDIS_CLUSTER_PREFERRED_ENDPOINT_TYPE: "hostname"
    networks:
      - app-network

  redis-node-6:
    image: bitnamilegacy/redis-cluster:7.4
    environment:
      <<: *redis-node-env
      REDIS_CLUSTER_ANNOUNCE_HOSTNAME: "redis-node-6"
      REDIS_CLUSTER_PREFERRED_ENDPOINT_TYPE: "hostname"
      REDIS_CLUSTER_CREATOR: "yes"
      REDIS_CLUSTER_REPLICAS: "1"
    networks:
      - app-network
    depends_on:
      - redis
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5

  # No-op the 1-shard bootstrap sidecar from platform.yml — the bitnami
  # cluster creator on ``redis-node-6`` handles cluster wiring here.
  redis-init:
    image: busybox
    command: /bin/true
    depends_on: []
    restart: "no"
